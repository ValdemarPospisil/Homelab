services:
  # --- MONITORING ---
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    profiles:
      - monitoring
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8088:8080"
    restart: unless-stopped
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Logs (Dozzle)"
      - "homepage.icon=dozzle.png"
      - "homepage.href=http://10.0.0.9:8088"


  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles:
      - monitoring
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=tajneheslo
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Grafana"
      - "homepage.icon=grafana.png"
      - "homepage.href=http://10.0.0.9:3002"


  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node-exporter
    profiles:
      - monitoring
    command:
      - '--path.rootfs=/host'
    restart: unless-stopped
    volumes:
      - '/:/host:ro'
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Node Exporter"
      - "homepage.icon=prometheus.png"


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles:
      - monitoring
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Prometheus"
      - "homepage.icon=prometheus.png"
      - "homepage.href=http://10.0.0.9:9090"
    ports:
      - "9090:9090"


  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    profiles:
      - monitoring
    ports:
      - "3001:3001"
    volumes:
      - ./uptime-kuma:/app/data
    restart: unless-stopped
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Uptime Kuma"
      - "homepage.icon=uptime-kuma.png"
      - "homepage.href=http://10.0.0.9:3001"


  # --- MEDIA ---
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    ports:
      - "13378:80"
    volumes:
      - ./media/audiobooks:/audiobooks
      - ./media/podcasts:/podcasts
      - ./audiobookshelf/config:/config
      - ./audiobookshelf/metadata:/metadata
    environment:
      - TZ=Europe/Prague
      - USER_ID=1000
      - GROUP_ID=1000
    restart: unless-stopped
    labels:
      - "homepage.group=Media"
      - "homepage.name=Audiobookshelf"
      - "homepage.icon=audiobookshelf.png"
      - "homepage.href=http://10.0.0.9:13378"

  kavita:
    image: jvmilazz0/kavita:latest
    container_name: kavita
    volumes:
      - ./media/manga:/manga
      - ./media/books:/books
      - ./kavita/data:/kavita/config
    environment:
      - TZ=Europe/Prague
    ports:
      - "5000:5000"
    restart: unless-stopped
    labels:
      - "homepage.group=Media"
      - "homepage.name=Kavita"
      - "homepage.icon=kavita.png"
      - "homepage.href=http://10.0.0.9:5000"

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Prague
      - VERSION=docker
      - PLEX_CLAIM=claim-9XjaA8cF9xE34GUW6qSp
    volumes:
      - ./plex/config:/config
      - ./media:/data
      - ./media/music:/music
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped
    labels:
      - "homepage.group=Media"
      - "homepage.name=Plex"
      - "homepage.icon=plex.png"
      - "homepage.href=http://10.0.0.9:32400/web"

  # --- UTILITIES ---
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    profiles:
      - utilities
    volumes:
      - ./media:/srv               
      - ./filebrowser/filebrowser.db:/database.db
      - ./filebrowser/settings.json:/.filebrowser.json
    ports:
      - "8082:80"
    restart: unless-stopped
    labels:
      - "homepage.group=Utilities"
      - "homepage.name=FileBrowser"
      - "homepage.icon=filebrowser.png"
      - "homepage.href=http://10.0.0.9:8082"


  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3000:3000"
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=*
      - PUID=1000
      - PGID=996
    env_file:
      - .env
    restart: unless-stopped

  playit:
    image: wisdomsky/playit-docker-web:latest
    container_name: playit
    profiles:
      - game
    network_mode: host
    volumes:
      - ./playit/data:/data
    restart: unless-stopped 
    labels:
      - "homepage.group=Utilities"
      - "homepage.name=Playit.gg"
      - "homepage.icon=playit.png"


  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    profiles:
      - utilities
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=moje_tajne_token_123
      - WATCHTOWER_HTTP_API_METRICS=true
    ports:
      - "8081:8080"
    restart: unless-stopped
    labels:
      - "homepage.group=Utilities"
      - "homepage.name=Watchtower"
      - "homepage.icon=watchtower.png"


  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8090:8080" # WebUI pro qBittorrent
      - "13567:13567" # Port Forwarding TCP (zpráva od podpory)
      - "13567:13567/udp" # Port Forwarding UDP
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${VPN_USER}
      - OPENVPN_PASSWORD=${VPN_PASSWORD}
      - OPENVPN_CUSTOM_CONFIG=/gluetun/custom.conf # Odkaz na ten soubor
      - FIREWALL_VPN_INPUT_PORTS=13567 # Port, co ti přidělí
    volumes:
      - ./gluetun/NL1.ovpn:/gluetun/custom.conf  
    restart: always
    labels:
      - "homepage.group=Utilities"
      - "homepage.name=VPN (Gluetun)"
      - "homepage.icon=gluetun.png"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Prague
      - WEBUI_PORT=8080
    volumes:
      - ./media:/data
      - ./qbittorrent/config:/config
    network_mode: service:gluetun
    restart: unless-stopped
    depends_on:
      gluetun:
        condition: service_healthy
    labels:
      - "homepage.group=Media"
      - "homepage.name=qBittorrent"
      - "homepage.icon=qbittorrent.png"
      - "homepage.href=http://10.0.0.9:8090"

  # --- MANAGEMENT (ARR STACK) ---
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Prague
    volumes:
      - ./bazarr/config:/config
      - ./media:/data
    ports:
      - "6767:6767"
    restart: unless-stopped
    labels:
      - "homepage.group=Management"
      - "homepage.name=Bazarr (Subtitles)"
      - "homepage.icon=bazarr.png"
      - "homepage.href=http://10.0.0.9:6767"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Prague
    volumes:
      - ./prowlarr/config:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    labels:
      - "homepage.group=Management"
      - "homepage.name=Prowlarr (Indexers)"
      - "homepage.icon=prowlarr.png"
      - "homepage.href=http://10.0.0.9:9696"

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Prague
    volumes:
      - ./radarr/config:/config
      # DŮLEŽITÉ: Mapujeme kořenovou složku 'media' jako '/data'
      - ./media:/data 
    ports:
      - "7878:7878"
    restart: unless-stopped
    labels:
      - "homepage.group=Media"
      - "homepage.name=Radarr (Movies)"
      - "homepage.icon=radarr.png"
      - "homepage.href=http://10.0.0.9:7878"

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Prague
    volumes:
      - ./sonarr/config:/config
      # Opět stejné mapování pro Hardlinks
      - ./media:/data
    ports:
      - "8989:8989"
    restart: unless-stopped
    labels:
      - "homepage.group=Media"
      - "homepage.name=Sonarr (TV)"
      - "homepage.icon=sonarr.png"
      - "homepage.href=http://10.0.0.9:8989"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=Europe/Prague
    ports:
      - "8191:8191"
    restart: unless-stopped
    labels:
      - "homepage.group=Utilities"
      - "homepage.name=FlareSolverr"
      - "homepage.icon=flaresolverr.png"

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Prague
    volumes:
      - ./lidarr/config:/config
      # Mapujeme kořenovou složku 'media' jako '/data', aby fungovaly hardlinky
      - ./media:/data 
    ports:
      - "8686:8686"
    restart: unless-stopped
    labels:
      - "homepage.group=Management"
      - "homepage.name=Lidarr (Music)"
      - "homepage.icon=lidarr.png"
      - "homepage.href=http://10.0.0.9:8686"

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=Europe/Prague
    volumes:
      - ./seerr/config:/app/config
    ports:
      - "5055:5055"
    restart: unless-stopped
    labels:
      - "homepage.group=Management"
      - "homepage.name=Seerr (Requests)"
      - "homepage.icon=seerr.png"
      - "homepage.href=http://10.0.0.9:5055"

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:8
    container_name: recyclarr
    user: "1000:1000"
    environment:
      - TZ=Europe/Prague
      - CRON_SCHEDULE=0 3 * * *
    volumes:
      - ./recyclarr/config:/config
    restart: unless-stopped
    labels:
      - "homepage.group=Management"
      - "homepage.name=Recyclarr"
      - "homepage.icon=recyclarr.png"

  # --- IMMICH ---
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    command: [ "start.sh", "immich" ]
    volumes:
      - ./immich/upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - ./immich/immich.env
    ports:
      - "2283:3001"
    depends_on:
      - immich-redis
      - immich-postgres
    restart: always
    labels:
      - "homepage.group=Media"
      - "homepage.name=Immich"
      - "homepage.icon=immich.png"
      - "homepage.href=http://10.0.0.9:2283"

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:release
    volumes:
      - ./immich/model-cache:/cache
    env_file:
      - ./immich/immich.env
    restart: always

  immich-redis:
    container_name: immich_redis
    image: docker.io/redis:6.2-alpine@sha256:4a0889cbfbd3aebcb1562e1a38a719c8f07cc1364506c83ef07e329007fbc0a2
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  immich-postgres:
    container_name: immich_postgres
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ./immich/postgres:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -dbname='${DB_DATABASE_NAME:-immich}' -U '${DB_USERNAME:-postgres}' || exit 1; Chksum="$$(psql -dbname='${DB_DATABASE_NAME:-immich}' -U '${DB_USERNAME:-postgres}' -t -A -c 'SHOW data_checksums;');" if [ "$$Chksum" = "on" ]; then exit 0; else exit 1; fi
      interval: 5m
      start_interval: 30s
      start_period: 5m
    command: ["postgres", "-c" ,"shared_preload_libraries=vectors.so", "-c", 'search_path="$$user", public, vectors', "-c", "logging_collector=on", "-c", "max_wal_size=2GB", "-c", "shared_buffers=512MB", "-c", "wal_compression=on"]
    restart: always

  # --- SPECIAL ---
  adguardhome:
    image: adguard/adguardhome
    container_name: adguardhome
    profiles:
      - ads
    network_mode: host
    volumes:
      - ./adguard/work:/opt/adguardhome/work
      - ./adguard/conf:/opt/adguardhome/conf
    restart: unless-stopped
    labels:
      - "homepage.group=Utilities"
      - "homepage.name=AdGuard Home"
      - "homepage.icon=adguard-home.png"
      - "homepage.href=http://10.0.0.9"

  minecraft:
    image: itzg/minecraft-server
    container_name: minecraft
    profiles: 
      - game
    ports:
      - "25565:25565"
    environment:
      - EULA=TRUE
      - TYPE=FABRIC
      - VERSION=1.21.1
      - MEMORY=3G
      - MOTD=Kingdom
      - DIFFICULTY=normal
      - MAX_PLAYERS=10
      - VIEW_DISTANCE=11
    volumes:
      - ./minecraft/data:/data
    restart: unless-stopped
    stdin_open: true
    tty: true
    labels:
      - "homepage.group=Gaming"
      - "homepage.name=Minecraft Server"
      - "homepage.icon=minecraft.png"

volumes:
  prometheus_data:
  grafana_data:
